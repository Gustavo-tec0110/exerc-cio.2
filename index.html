<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Github Ajax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="profile-card" aria-live="polite">
      <img id="avatar" class="avatar" alt="Avatar do perfil">
      <h1 id="name">Carregando...</h1>
      <p id="username" class="username">@carregando</p>

      <hr>

      <div class="stats">
        <div class="stat">
          <h2>REPOSITORIOS</h2>
          <strong id="repos">0</strong>
        </div>
        <div class="stat">
          <h2>SEGUIDORES</h2>
          <strong id="followers">0</strong>
        </div>
        <div class="stat">
          <h2>SEGUINDO</h2>
          <strong id="following">0</strong>
        </div>
      </div>

      <a id="profile-link" class="btn" href="#" target="_blank" rel="noopener noreferrer">
        Ver no Github
      </a>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
