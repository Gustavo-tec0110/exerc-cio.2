<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercicio ES6 - Alunos Aprovados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Exercicio ES6</p>
      <h1>Array de alunos com filtro de aprovados</h1>
      <p class="lead">
        O projeto usa um array de objetos com <strong>nome</strong> e <strong>nota</strong>, e uma funcao que retorna
        apenas os alunos com nota maior ou igual a 6.
      </p>
    </section>

    <section class="dashboard">
      <article class="info-card">
        <p class="label">Total de alunos</p>
        <strong id="total-alunos">0</strong>
      </article>
      <article class="info-card success">
        <p class="label">Aprovados</p>
        <strong id="total-aprovados">0</strong>
      </article>
      <article class="info-card alert">
        <p class="label">Corte minimo</p>
        <strong>6.0</strong>
      </article>
    </section>

    <section class="content-grid">
      <article class="panel">
        <div class="panel-header">
          <p class="eyebrow">Array original</p>
          <h2>Todos os alunos</h2>
        </div>
        <div id="lista-alunos" class="student-list"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <p class="eyebrow">Funcao de filtro</p>
          <h2>Alunos aprovados</h2>
        </div>
        <div id="lista-aprovados" class="student-list"></div>
      </article>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
